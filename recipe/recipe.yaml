schema_version: 1

context:
  name: azure-mgmt-sqlvirtualmachine
  version: 1.0.0b6

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/azure-mgmt-sqlvirtualmachine-${{ version }}.zip
  sha256: 7457061782e3e368b51bbe9f79f7d2bcf1eccf96aaead3cf522076d0c7082b0d

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  noarch: python

requirements:
  host:
    - setuptools
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}
    - azure-common >=1.1,<2.dev0
    - isodate >=0.6.1
    - azure-mgmt-core>=1.3.2
    - typing-extensions >=4.3.0

tests:
  - python:
      imports:
        - azure.mgmt.sqlvirtualmachine
        - azure.mgmt.sqlvirtualmachine.models
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Microsoft Azure SQL Virtual Machine Management Client Library for Python
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/Azure/azure-sdk-for-python

extra:
  recipe-maintainers:
    - janjagusch
