schema_version: 1

context:
  name: azure-mgmt-sqlvirtualmachine
  version: 1.0.0b5

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/azure-mgmt-sqlvirtualmachine-${{ version }}.zip
  sha256: 6458097e58329d14b1a3e07e56ca38797d4985e5a50d08df27d426ba95f2a4c7

build:
  number: 0
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  noarch: python

requirements:
  host:
    - setuptools
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}
    - azure-common >=1.1,<2.0
    - azure-mgmt-core >=1.3.2,<2.0
    - msrest >=0.7.1

tests:
  - python:
      imports:
        - azure.mgmt.sqlvirtualmachine
        - azure.mgmt.sqlvirtualmachine.models
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Microsoft Azure SQL Virtual Machine Management Client Library for Python
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/Azure/azure-sdk-for-python

extra:
  recipe-maintainers:
    - janjagusch
